name: Deploy to EC2

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  APP_IMAGE: bookcabin-app
  API_IMAGE: bookcabin-agent

jobs:
  # ═══════════════ JOB 1: Test ═══════════════
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: testing
          MYSQL_DATABASE: bookcabin_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=3

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: pdo_mysql, mbstring, bcmath, gd, intl, zip
          coverage: xdebug

      - name: Install Composer dependencies
        run: composer install --no-progress --prefer-dist

      - name: Copy .env
        run: cp .env.example .env

      - name: Generate app key
        run: php artisan key:generate

      - name: Run migrations
        env:
          DB_CONNECTION: mysql
          DB_HOST: 127.0.0.1
          DB_PORT: 3306
          DB_DATABASE: bookcabin_test
          DB_USERNAME: root
          DB_PASSWORD: testing
        run: php artisan migrate --force

      - name: Run PHPUnit tests
        env:
          DB_CONNECTION: mysql
          DB_HOST: 127.0.0.1
          DB_PORT: 3306
          DB_DATABASE: bookcabin_test
          DB_USERNAME: root
          DB_PASSWORD: testing
        run: php artisan test --coverage-text --min=60

  # ═══════════════ JOB 2: Build & Deploy ═══════════════
  deploy:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker images
        run: |
          docker build -f docker/Dockerfile.app -t ${{ env.APP_IMAGE }}:${{ github.sha }} .
          docker build -f docker/Dockerfile.api -t ${{ env.API_IMAGE }}:${{ github.sha }} .

      - name: Save Docker images
        run: |
          docker save ${{ env.APP_IMAGE }}:${{ github.sha }} | gzip > app-image.tar.gz
          docker save ${{ env.API_IMAGE }}:${{ github.sha }} | gzip > api-image.tar.gz

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.EC2_HOST }} >> ~/.ssh/known_hosts 2>/dev/null

      - name: Upload images to EC2
        run: |
          scp -i ~/.ssh/deploy_key app-image.tar.gz ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}:/tmp/
          scp -i ~/.ssh/deploy_key api-image.tar.gz ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}:/tmp/

      - name: Deploy on EC2
        run: |
          ssh -i ~/.ssh/deploy_key ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} << 'DEPLOY'
            set -e

            echo "=== Loading Docker images ==="
            docker load < /tmp/app-image.tar.gz
            docker load < /tmp/api-image.tar.gz
            rm -f /tmp/app-image.tar.gz /tmp/api-image.tar.gz

            echo "=== Pulling latest compose config ==="
            cd /opt/bookcabin
            git pull origin main 2>/dev/null || true

            echo "=== Deploying with docker-compose ==="
            export APP_IMAGE=${{ env.APP_IMAGE }}:${{ github.sha }}
            export API_IMAGE=${{ env.API_IMAGE }}:${{ github.sha }}
            docker compose -f docker/docker-compose.prod.yml up -d --remove-orphans

            echo "=== Running migrations ==="
            docker exec bookcabin-app php artisan migrate --force

            echo "=== Health check ==="
            sleep 5
            curl -sf http://localhost/api/health || echo "WARNING: Health check failed"

            echo "=== Cleanup old images ==="
            docker image prune -f

            echo "=== Deploy complete ==="
          DEPLOY

      - name: Notify deploy status
        if: always()
        run: |
          if [ "${{ job.status }}" = "success" ]; then
            echo "✅ Deploy berhasil: ${{ github.sha }}"
          else
            echo "❌ Deploy gagal: ${{ github.sha }}"
          fi
